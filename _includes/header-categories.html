<!-- Page Header -->
{% if page.background %}
<header class="masthead-categories" style="background-image: url('{{ page.background | prepend: site.baseurl | replace: '//', '/' }}')">
  {% else %}
  <header class="masthead-categories">
    {% endif %}
    <div class="overlay-categories"></div>
    <div class="container">
      <div class="row">
        <div class="col-lg-8 col-md-10 mx-auto">
          <div class="page-heading-categories">
            <h1>{{ page.title }}</h1>
          </div>
        </div>
      </div>
    </div>
  </header>
